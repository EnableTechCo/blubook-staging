name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - name: Validate migration filenames
        run: |
          invalid=$(find supabase/migrations -type f -name '*.sql' ! -regex '.*/[0-9]\{14\}_[a-z0-9_]*\.sql' -print)
          test -z "$invalid" || { echo "Invalid migration filenames:"; echo "$invalid"; exit 1; }
