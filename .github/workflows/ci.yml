name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    # Placeholder values so the app's env schemas parse during build and e2e.
    # No real Supabase is provisioned in CI; auth-dependent e2e stays opt-in
    # (RUN_AUTH_E2E) and the unauthenticated redirect test fails closed.
    env:
      NEXT_PUBLIC_APP_NAME: BluBook
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_ENVIRONMENT: local
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - name: Validate migration filenames
        run: |
          invalid=$(find supabase/migrations -regextype posix-extended -type f -name '*.sql' ! -regex '.*/[0-9]{14}_[a-z0-9_]+\.sql' -print)
          test -z "$invalid" || { echo "Invalid migration filenames:"; echo "$invalid"; exit 1; }
